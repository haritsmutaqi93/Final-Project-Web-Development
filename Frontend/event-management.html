<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Event Management | Arenangor</title>

    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/event-management.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <!-- ADMIN NAVBAR -->


    <section class="page-header">

        <span>ADMIN PANEL</span>

        <h1>Event Management</h1>

        <p>
            Create, update and manage sports events and tournaments.
        </p>

    </section>


    <section class="table-section">

        <div class="table-card">

            <div class="table-top">

                <input
                    id="eventName"
                    type="text"
                    placeholder="Event Name">

                <input
                    id="eventDate"
                    type="date">

                <input
                    id="fee"
                    type="number"
                    placeholder="Registration Fee">

                <select id="status">

                    <option value="Active">Active</option>
                    <option value="Draft">Draft</option>
                    <option value="Closed">Closed</option>

                </select>

                <button onclick="addEvent()">
                    + Create Event
                </button>

            </div>

            <table>

                <thead>

                    <tr>

                        <th>ID</th>
                        <th>Event Name</th>
                        <th>Date</th>
                        <th>Participants</th>
                        <th>Status</th>
                        <th>Actions</th>

                    </tr>

                </thead>

                <tbody id="eventTable">
                    
                </tbody>

            </table>

        </div>

    </section>

    <script>

loadEvents();

async function loadEvents(){

    const response =
    await fetch(
        "/api/events"
    );

    const data =
    await response.json();

    let html = "";

    data.forEach(event=>{

        html += `

        <tr>

            <td>${event.event_id}</td>

            <td>${event.event_name}</td>

            <td>${new Date(event.event_date).toLocaleDateString("en-GB")}</td>

            <td>Rp ${event.registration_fee}</td>

            <td>${event.event_status}</td>

            <td>

                <button
                class="edit-btn"
                onclick="editEvent(${event.event_id})">
                Edit
                </button>

                <button
                class="delete-btn"
                onclick="deleteEvent(${event.event_id})">
                Delete
                </button>

            </td>

        </tr>

        `;

    });

    document
    .getElementById("eventTable")
    .innerHTML = html;

}

async function addEvent(){

    await fetch(
        "/api/events",
        {

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                event_name:
                document.getElementById("eventName").value,

                description:
                "Sports Event",

                event_date:
                document.getElementById("eventDate").value,

                registration_fee:
                document.getElementById("fee").value,

                event_status:
                document.getElementById("status").value

            })

        }
    );

    loadEvents();

}

async function deleteEvent(id){

    await fetch(
        `/api/events/${id}`,
        {
            method:"DELETE"
        }
    );

    loadEvents();

}

async function editEvent(id){

    const newName =
    prompt("New Event Name");

    if(!newName) return;

    await fetch(
        `/api/events/${id}`,
        {

            method:"PUT",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                event_name:newName,

                description:"Updated",

                event_date:"2026-07-01",

                registration_fee:50000,

                event_status:"Active"

            })

        }
    );

    loadEvents();

}

</script>

</body>

</html>
